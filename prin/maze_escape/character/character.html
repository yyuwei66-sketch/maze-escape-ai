<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Character - Maze Escape</title>
    <style>
        /* ================= 字体设置 ================= */
        @font-face {
            font-family: 'Munro';
            src: url('munro.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('森林开始界面背景图.png');
            background-size: cover;
            background-position: center;
            font-family: 'Munro', monospace; 
            /* 添加一点暗化背景，让前面的卡牌更突出 */
            background-color: rgba(0, 0, 0, 0.4);
            background-blend-mode: overlay;
        }

        .select-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 4vh; /* 标题和卡牌之间的间距 */
        }

        /* ================= 顶部木板标题 ================= */
        .title-board {
            position: relative;
            width: 65vw;
            max-width: 650px;
            height: 20vh;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.7));
        }

        .title-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .title-text {
            position: relative;
            z-index: 2;
            color: #F4D03F;
            font-size: clamp(25px, 4vw, 45px);
            text-shadow: 3px 4px 0px #000;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        /* ================= 卡牌容器 ================= */
        .cards-wrapper {
            display: flex;
            flex-direction: row;
            gap: 8vw; /* 两张卡牌之间的距离 */
            justify-content: center;
            align-items: center;
        }

        /* ================= 核心：卡牌样式与交互 ================= */
        .card {
            position: relative;
            width: 26vw;
            max-width: 360px;
            min-width: 250px;
            aspect-ratio: 2 / 3; /* 强制卡牌保持 2:3 的黄金比例 */
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.6));
        }

        /* 鼠标悬停时卡牌稍微上浮并放大 */
        .card:hover {
            transform: translateY(-15px) scale(1.05);
        }

        /* 普通卡牌底图 */
        .card-bg-normal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        /* 高亮卡牌底图（默认隐藏，悬停时显示） */
        .card-bg-hover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 2;
            opacity: 0; /* 默认完全透明 */
            transition: opacity 0.3s ease;
        }

        /* 鼠标悬停时，高亮图片显现 */
        .card:hover .card-bg-hover {
            opacity: 1;
        }

        /* ================= 卡牌内部元素（角色图和文字） ================= */
        .char-img {
            position: absolute;
            top: 42%; /* 角色稍微偏上一点，给下面留出写字的空间 */
            left: 50%;
            transform: translate(-50%, -50%);
            height: 55%; /* 角色图的高度占比 */
            width: auto;
            z-index: 3;
            filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        /* 悬停时角色也跟着微微放大，增加互动感 */
        .card:hover .char-img {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .card-text {
            position: absolute;
            bottom: 12%; /* 文字放在底部 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: #2E1A0F; /* 因为是羊皮纸，用深墨水棕色比金色更真实 */
            font-size: clamp(20px, 2.5vw, 32px);
            white-space: nowrap;
            letter-spacing: 1px;
            font-weight: bold;
            /* 给文字加一点非常淡的浅色光晕，防止被背景纸纹理吃掉 */
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5); 
        }
    </style>
</head>
<body>

    <div class="select-container">
        <div class="title-board">
            <img src="木板.png" class="title-bg" alt="board">
            <span class="title-text">CHOOSE YOUR CHARACTER</span>
        </div>

        <div class="cards-wrapper">
            
            <div class="card" onclick="alert('你选择了：怪物阵营！准备进入游戏...')">
                <img src="卡牌.png" class="card-bg-normal" alt="card normal">
                <img src="高亮卡牌.png" class="card-bg-hover" alt="card hover">
                <img src="怪物.png" class="char-img" alt="monster">
                <span class="card-text">PLAY AS MONSTER</span>
            </div>

            <div class="card" onclick="alert('你选择了：人类阵营！准备进入游戏...')">
                <img src="卡牌.png" class="card-bg-normal" alt="card normal">
                <img src="高亮卡牌.png" class="card-bg-hover" alt="card hover">
                <img src="人物.png" class="char-img" alt="human">
                <span class="card-text">PLAY AS HUMAN</span>
            </div>

        </div>
    </div>

</body>
</html>
