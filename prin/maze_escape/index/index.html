<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Escape - Start Menu</title>
    <style>
        @font-face {
            font-family: 'Munro';
            src: url('munro.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('森林开始界面背景图.png');
            background-size: cover;
            background-position: center;
            font-family: 'Munro', monospace; 
        }

        .menu-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .gate-wrapper {
            position: relative;
            width: 80vw;          
            max-width: 1100px;    
            display: flex;
            justify-content: center;
            margin-top: -6vh;     
        }

        .game-logo {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.7));
        }

        /* ================= 核心修改 1：取消强制压缩 ================= */
        .button-group {
            position: absolute;
            bottom: 5%;           /* 锚定在门框下部 */
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            /* 设定固定的垂直间距，不再让系统瞎挤 */
            gap: 2.5vh;             
            align-items: center;
        }

        /* ================= 核心修改 2：强行撑开高度 ================= */
        .menu-btn {
            position: relative;
            width: 45%;           
            max-width: 450px;
            /* 使用视口高度(vh)和像素强制规定高度，绝对不允许缩水！ */
            height: clamp(65px, 8.5vh, 110px); 
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            /* 强制要求在 flexbox 里不许缩小自己 */
            flex-shrink: 0; 
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
        }

        .btn-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            z-index: 1;
        }

        .btn-text {
            position: absolute;
            top: 50%;
            left: 50%;            
            transform: translate(-50%, -50%);
            z-index: 2;
            color: #F4D03F;
            font-family: 'Munro', monospace; 
            /* 略微调小一点字号，给上下留出呼吸感 */
            font-size: clamp(20px, 3.2vw, 38px); 
            white-space: nowrap;  
            text-shadow: 3px 4px 0px #000; 
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="gate-wrapper">
            
            <img src="游戏logo.png" alt="Maze Escape Logo" class="game-logo">

            <div class="button-group">
                <button class="menu-btn" onclick="alert('进入难度选择页面！')">
                    <img src="木板.png" alt="board" class="btn-bg">
                    <span class="btn-text">START GAME</span>
                </button>

                <button class="menu-btn" onclick="alert('打开介绍手册！')">
                    <img src="木板.png" alt="board" class="btn-bg">
                    <span class="btn-text">MANUAL</span>
                </button>

                <button class="menu-btn" onclick="alert('退出游戏！')">
                    <img src="木板.png" alt="board" class="btn-bg">
                    <span class="btn-text">EXIT</span>
                </button>
            </div>

        </div>
    </div>

</body>
</html>
