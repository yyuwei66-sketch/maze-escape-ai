<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="prefetch" href="/ui/play/monster.html">
    <link rel="prefetch" href="/ui/difficulty/difficulty.html">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Character - Maze Escape</title>
    <style>
        @font-face {
            font-family: 'Munro';
            src: url('/ui/fonts/munro.ttf') format('truetype');
        }

        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-image: url('/ui/character/background.png');
            background-size: cover;
            background-position: center;
            font-family: 'Munro', monospace;
            background-color: rgba(0, 0, 0, 0.4);
            background-blend-mode: overlay;
        }

        .select-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 4vh;
        }

        .title-board {
            position: relative;
            width: 65vw;
            max-width: 650px;
            height: 20vh;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.7));
        }

        .title-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .title-text {
            position: relative;
            z-index: 2;
            color: #F4D03F;
            font-size: clamp(25px, 4vw, 45px);
            text-shadow: 3px 4px 0px #000;
            letter-spacing: 3px;
            white-space: nowrap;
        }

        .cards-wrapper {
            display: flex;
            flex-direction: row;
            gap: 8vw;
            justify-content: center;
            align-items: center;
            margin-top: -5vh; 
        }

        .card {
            position: relative;
            width: 26vw;
            max-width: 360px;
            min-width: 250px;
            aspect-ratio: 2 / 3;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.6));
        }

        .card:hover {
            transform: translateY(-15px) scale(1.05);
        }

        .card-bg-normal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .card-bg-hover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover .card-bg-hover {
            opacity: 1;
        }

        .char-img {
            position: absolute;
            top: 42%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: 55%;
            width: auto;
            z-index: 3;
            filter: drop-shadow(0px 8px 10px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .card:hover .char-img {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .card-text {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: #2E1A0F;
            font-size: clamp(20px, 2.5vw, 32px);
            white-space: nowrap;
            letter-spacing: 1px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="select-container">
        <div class="title-board">
            <img src="/ui/character/wood.png" class="title-bg" alt="board">
            <span class="title-text">CHOOSE YOUR CHARACTER</span>
        </div>

        <div class="cards-wrapper">

            <div class="card" onclick="selectFaction('monster')">
                <img src="/ui/character/card.png" class="card-bg-normal" alt="card normal">
                <img src="/ui/character/light_card.png" class="card-bg-hover" alt="card hover">
                <img src="/ui/character/one_monster.png" class="char-img" alt="monster">
                <span class="card-text">PLAY AS MONSTER</span>
            </div>

            <div class="card" onclick="selectFaction('human')">
                <img src="/ui/character/card.png" class="card-bg-normal" alt="card normal">
                <img src="/ui/character/light_card.png" class="card-bg-hover" alt="card hover">
                <img src="/ui/character/one_human.png" class="char-img" alt="human">
                <span class="card-text">PLAY AS HUMAN</span>
            </div>

        </div>
    </div>

    <div id="faction-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:100; flex-direction:column; align-items:center; justify-content:center; gap:12px; animation:fadeIn 0.3s ease;">
        <p id="overlay-label" style="color:#aaa; font-size:14px; letter-spacing:4px; margin:0; font-family:'Munro',monospace;"></p>
        <p id="overlay-msg" style="color:#fff; font-size:20px; letter-spacing:2px; margin:0; font-family:'Munro',monospace;"></p>
        <div style="margin-top:10px; width:200px; height:3px; background:rgba(255,255,255,0.15); border-radius:2px; overflow:hidden;">
            <div id="overlay-bar" style="height:100%; width:0%; background:#fff; transition:width 1.5s linear;"></div>
        </div>
    </div>

    <script>
    function selectFaction(faction) {
        const overlay = document.getElementById('faction-overlay');

        document.getElementById('overlay-label').textContent =
            faction === 'monster' ? 'FACTION: MONSTER' : 'FACTION: HUMAN';

        document.getElementById('overlay-msg').textContent =
            faction === 'monster'
                ? 'Monster faction confirmed. Get ready...'
                : 'Human faction confirmed. Get ready...';

        overlay.style.display = 'flex';

        // 触发进度条动画（确保重新计算）
        const bar = document.getElementById('overlay-bar');
        bar.style.width = '0%';

        setTimeout(() => {
            bar.style.width = '100%';
        }, 50);

        // 👇 延迟跳转（必须大于动画时间）
        setTimeout(() => {
            if (faction === 'monster') {
                window.location.href = '/ui/play/monster.html';
            } else {
                window.location.href = '/ui/difficulty/difficulty.html';
            }
        }, 1500); // 跟你的 transition: 1.5s 对齐
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') window.location.href = 'ui/index/index.html';
    });
    </script>

    <script src="/ui/global-controls.js"></script>

</body>
</html>
