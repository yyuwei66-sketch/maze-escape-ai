<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="prefetch" href="/ui/manual/manual.html">
    <link rel="prefetch" href="/ui/character/character.html">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Escape - Start Menu</title>

    <style>
        @font-face {
            font-family: 'Munro';
            src: url('/ui/fonts/munro.ttf') format('truetype');
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;

            background-image: url('/ui/index/start_background.png');
            background-size: cover;
            background-position: center;

            font-family: 'Munro', monospace;
        }

        .menu-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .gate-wrapper {
            position: relative;
            width: 80vw;
            max-width: 1100px;
            display: flex;
            justify-content: center;
            margin-top: -6vh;
        }

        .game-logo {
            width: 100%;
            height: auto;
            filter: drop-shadow(0px 15px 20px rgba(0,0,0,0.7));
        }

        .button-group {
            position: absolute;
            bottom: 5%;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2.5vh;
            align-items: center;
        }

        .menu-btn {
            position: relative;
            width: 45%;
            max-width: 450px;
            height: clamp(65px, 8.5vh, 110px);
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            outline: none;
            flex-shrink: 0;
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .menu-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.15);
        }

        .btn-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }

        .btn-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;

            color: #F4D03F;
            font-family: 'Munro', monospace;
            font-size: clamp(20px, 3.2vw, 38px);
            white-space: nowrap;
            text-shadow: 3px 4px 0px #000;
            letter-spacing: 4px;
        }
    </style>
</head>

<body>

<div class="menu-container">
    <div class="gate-wrapper">

        <!-- LOGO -->
        <img src="/ui/index/logo.png" alt="Maze Escape Logo" class="game-logo">

        <div class="button-group">

            <!-- START GAME -->
            <button class="menu-btn" onclick="goStart()">
                <img src="/ui/index/wood.png" class="btn-bg">
                <span class="btn-text">START GAME</span>
            </button>

            <!-- MANUAL -->
            <button class="menu-btn" onclick="goManual()">
                <img src="/ui/index/wood.png" class="btn-bg">
                <span class="btn-text">MANUAL</span>
            </button>

            <!-- EXIT -->
            <button class="menu-btn" onclick="goExit()">
                <img src="/ui/index/wood.png" class="btn-bg">
                <span class="btn-text">EXIT</span>
            </button>

        </div>

    </div>
</div>

<script>
function goStart(){
    window.location.href = "/ui/character/character.html";
}

function goManual(){
    window.location.href = "/ui/manual/manual.html";
}

function goExit(){
    window.location.href = "/ui/index/index.html";
}
</script>

</body>
</html>
